name: release

# Publish the downloadable agent bundle (makeitdown-agent.zip) to a GitHub
# Release whenever a version tag is pushed, e.g.:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build agent bundle
        run: python scripts/build_agent_bundle.py
      - name: Publish release with the bundle attached
        uses: softprops/action-gh-release@v2
        with:
          files: dist/makeitdown-agent.zip
          generate_release_notes: true
